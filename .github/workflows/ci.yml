name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            extra-substituters = https://cache.iog.io s3://mb-nix-cache?region=us-east-1
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= equitek-ci:vXVUXig6ISy/jPmxB9VPRwpju17OfraujXiUwAXW6co=

      - name: Build
        run: nix build --print-build-logs

      - name: Run tests
        run: nix build .#checks.x86_64-linux.pureclaw-test --print-build-logs

      # Push to binary cache on main branch only
      - name: Push to binary cache
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_AWS_SECRET_ACCESS_KEY }}
          NIX_CACHE_SIGNING_KEY: ${{ secrets.NIX_CACHE_SIGNING_KEY }}
        run: |
          # Sign and push the build result and its closure
          nix store sign --recursive --key-file <(echo "$NIX_CACHE_SIGNING_KEY") ./result
          nix copy --to "s3://mb-nix-cache?region=us-east-1" ./result
